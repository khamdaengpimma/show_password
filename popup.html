<!DOCTYPE html>
<html>
<head>
    <title>Password Viewer</title>

    <style>
        body {
            width: 220px;
            padding: 15px;
            font-family: Arial;
            background: #f5f5f5;
        }

        h3 {
            margin-top: 0;
            text-align: center;
        }

        .switch {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            background: #4285f4;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <h3>Password Viewer</h3>

    <div class="switch">
        <span>Enable Extension</span>
        <input type="checkbox" id="toggle">
    </div>

    <script src="popup.js"></script>

</body>
</html>
